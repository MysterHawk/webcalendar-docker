services:
  webcalendar:
    # Defaults to the prebuilt multi-arch image from GHCR. Run with
    # `docker compose up -d --build` to build locally instead (e.g. if
    # you changed WEBCALENDAR_REF and want a custom build).
    image: ghcr.io/mysterhawk/webcalendar-docker:latest
    build:
      context: .
      args:
        WEBCALENDAR_REF: "v1.9.19"
    container_name: webcalendar
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      # Persists the sqlite database file across rebuilds/recreation.
      - ./webcalendar-data:/var/www/html/data
      # Persists includes/settings.php (written by the install wizard) —
      # Docker seeds this volume with the image's own includes/ content on
      # first use, so all the app's other includes/*.php files stay intact.
      - ./webcalendar-includes:/var/www/html/includes
